<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8001D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1A36;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#E8001D" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#redGrad)" stroke-width="3" opacity="0.3"/>

  <!-- Music note -->
  <g filter="url(#shadow)">
    <!-- Note stem -->
    <rect x="120" y="35" width="6" height="95" rx="3" fill="url(#redGrad)"/>

    <!-- Note head (ellipse) -->
    <ellipse cx="105" cy="130" rx="22" ry="16" transform="rotate(-15, 105, 130)" fill="url(#redGrad)"/>

    <!-- Flag / beam -->
    <path d="M126 35 Q145 50 140 75 Q138 85 126 80 Q135 65 133 50 Q130 42 126 35Z" fill="url(#redGrad)"/>
  </g>

  <!-- Play button triangle -->
  <g transform="translate(60, 55)">
    <polygon points="0,-25 30,0 0,25" fill="white" opacity="0.95"/>
  </g>

  <!-- LYKY text -->
  <text x="100" y="180" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="4" fill="white">
    <tspan fill="white">LYKY</tspan>
    <tspan fill="#E8001D" dx="4">LABEL</tspan>
  </text>
</svg>
